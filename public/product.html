<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details – Retech Revival</title>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';</script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .lucide { width: 1em; height: 1em; vertical-align: middle; }
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; padding: 3rem 0; }
    .product-img-box {
      background: linear-gradient(135deg, rgba(15,40,71,0.1), rgba(16,185,129,0.07));
      border: 1px solid var(--border); border-radius: var(--radius);
      height: 360px; display: flex; align-items: center; justify-content: center; font-size: 9rem;
    }
    .product-details h1 { font-size: 1.7rem; font-weight: 800; margin-bottom: 0.5rem; }
    .product-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .price-section { margin: 1.5rem 0; }
    .price-section .original { font-size: 1rem; color: var(--text3); text-decoration: line-through; }
    .price-section .current { font-size: 2.2rem; font-weight: 900; color: var(--primary); }
    .price-section .savings { font-size: 0.9rem; color: var(--green); font-weight: 600; }
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 1.5rem 0; }
    .spec-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem; }
    .spec-item .spec-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); font-weight: 600; }
    .spec-item .spec-val { font-size: 0.92rem; font-weight: 700; margin-top: 0.2rem; }
    .action-btns { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .warranty-banner { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); border-radius: var(--radius-sm); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; margin-top: 1.25rem; }
    @media (max-width: 800px) { .product-layout { grid-template-columns: 1fr; } .specs-grid { grid-template-columns: 1fr 1fr; } }

    /* ── Reviews Section ─────────────────────────── */
    .reviews-section { padding: 3rem 0 4rem; }
    .reviews-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
    .reviews-header h2 { font-size: 1.5rem; font-weight: 800; }
    .reviews-header .review-count-badge { background: var(--bg3); border: 1px solid var(--border); padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: var(--text2); }
    .reviews-grid { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }
    @media (max-width: 800px) { .reviews-grid { grid-template-columns: 1fr; } }

    /* Stats Sidebar */
    .review-stats { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; position: sticky; top: 90px; }
    .review-stats .big-rating { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .review-stats .big-stars { color: #f59e0b; font-size: 1.1rem; letter-spacing: 2px; margin: 0.4rem 0 0.2rem; }
    .review-stats .total-text { font-size: 0.85rem; color: var(--text3); margin-bottom: 1.25rem; }
    .rating-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .rating-bar .bar-label { font-size: 0.8rem; font-weight: 600; width: 14px; text-align: right; color: var(--text2); }
    .rating-bar .bar-star { color: #f59e0b; font-size: 0.7rem; }
    .rating-bar .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .rating-bar .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #f59e0b, #fbbf24); transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
    .rating-bar .bar-count { font-size: 0.78rem; color: var(--text3); width: 24px; }

    /* Write Review Button */
    .write-review-btn { width: 100%; margin-top: 1.25rem; padding: 0.75rem; background: linear-gradient(135deg, var(--primary), #0a1628); color: white; border: none; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s; position: relative; overflow: hidden; }
    .write-review-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(15,40,71,0.4); }
    .write-review-btn::after { content:''; position:absolute; top:0; left:-100%; width:50%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent); transform:skewX(-20deg); animation:shimmer 3s infinite; }

    /* Review Form */
    .review-form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1.5rem; display: none; animation: fadeInUp 0.5s ease forwards; }
    .review-form-card.visible { display: block; }
    .review-form-card h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .star-selector { display: flex; gap: 0.25rem; margin-bottom: 1rem; }
    .star-selector .star-btn { background: none; border: none; font-size: 2rem; color: var(--bg3); cursor: pointer; transition: all 0.2s; padding: 0; line-height: 1; }
    .star-selector .star-btn:hover, .star-selector .star-btn.active { color: #f59e0b; transform: scale(1.2); }
    .star-selector .star-btn.active { text-shadow: 0 0 12px rgba(245,158,11,0.4); }
    .review-form-card .form-group { margin-bottom: 1rem; }
    .review-form-card .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 0.3rem; }
    .review-form-card textarea { min-height: 100px; resize: vertical; }
    .review-form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .char-count { font-size: 0.75rem; color: var(--text3); text-align: right; margin-top: 0.2rem; }

    /* Review Cards */
    .review-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: all 0.3s; }
    .review-card:hover { border-color: rgba(16,185,129,0.3); box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
    .review-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .review-author { display: flex; align-items: center; gap: 0.75rem; }
    .review-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
    .review-author-info .review-name { font-weight: 700; font-size: 0.92rem; }
    .review-author-info .review-date { font-size: 0.78rem; color: var(--text3); }
    .review-verified { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-weight: 600; color: var(--green); background: rgba(5,150,105,0.08); padding: 0.2rem 0.5rem; border-radius: 12px; }
    .review-stars { color: #f59e0b; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .review-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.4rem; }
    .review-body { font-size: 0.9rem; color: var(--text2); line-height: 1.7; }
    .review-footer { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .helpful-btn { background: var(--bg3); border: 1px solid var(--border); padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.78rem; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 0.35rem; transition: all 0.2s; font-family: inherit; }
    .helpful-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(16,185,129,0.06); }
    .reviews-list { display: flex; flex-direction: column; gap: 1rem; }
    .no-reviews { text-align: center; padding: 3rem 1rem; color: var(--text3); }
    .no-reviews .no-reviews-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="img/logo.png" alt="Retech Revival Logo" style="width:36px;height:36px;border-radius:8px;object-fit:cover;">
      <div>
        <span style="display:block;font-weight:800;letter-spacing:-0.02em;">Retech Revival</span>
        <span style="display:block;font-size:0.62rem;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:-2px;">Tech Reborn. Value Restored.</span>
      </div>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="/">Home</a><a href="/catalog.html" class="active">Buy</a>
      <a href="/sell.html">Sell</a><a href="/subscribe.html">Subscribe</a><a href="/about.html">About</a>
    </div>
    <div class="nav-actions">
      <a href="/cart.html" class="cart-btn"><i data-lucide="shopping-cart"></i> Cart<span class="cart-count" id="cart-count-badge">0</span></a>
      <a href="/login.html" class="btn-outline" id="nav-login-btn">Login</a>
      <a href="/signup.html" class="btn-primary" id="nav-signup-btn">Sign Up</a>
      <div id="nav-user-menu" class="hidden" style="display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:0.9rem;color:var(--text2)">Hi, <strong id="nav-user-name"></strong></span>
        <button onclick="logout()" class="btn-outline" style="padding:0.4rem 0.8rem;font-size:0.85rem">Logout</button>
      </div>
      <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div style="padding:1.5rem 0 0">
        <a href="/catalog.html" style="color:var(--text2);font-size:0.88rem">← Back to Catalog</a>
      </div>
      <div class="product-layout" id="product-content">
        <div class="spinner" style="grid-column:1/-1"></div>
      </div>
      <!-- Reviews Section -->
      <div class="reviews-section" id="reviews-section">
        <div class="reviews-header">
          <h2><i data-lucide="message-square"></i> Customer Reviews</h2>
          <span class="review-count-badge" id="review-total-badge">0 reviews</span>
        </div>
        <div class="reviews-grid">
          <div class="review-stats" id="review-stats">
            <div class="big-rating" id="big-rating">0.0</div>
            <div class="big-stars" id="big-stars">☆☆☆☆☆</div>
            <div class="total-text" id="total-text">No reviews yet</div>
            <div id="rating-bars"></div>
            <button class="write-review-btn" id="write-review-btn" onclick="toggleReviewForm()">✏️ Write a Review</button>
          </div>
          <div>
            <div class="review-form-card" id="review-form-card">
              <h3>✍️ Share Your Experience</h3>
              <div class="form-group">
                <label>Your Rating</label>
                <div class="star-selector" id="star-selector"></div>
              </div>
              <div class="form-group">
                <label>Review Title</label>
                <input type="text" class="form-control" id="review-title" placeholder="Summarize your experience" maxlength="120">
                <div class="char-count"><span id="title-chars">0</span>/120</div>
              </div>
              <div class="form-group">
                <label>Your Review</label>
                <textarea class="form-control" id="review-body" placeholder="What did you like or dislike?" maxlength="2000"></textarea>
                <div class="char-count"><span id="body-chars">0</span>/2000</div>
              </div>
              <div class="review-form-actions">
                <button class="btn btn-ghost" onclick="toggleReviewForm()">Cancel</button>
                <button class="btn btn-violet" id="submit-review-btn" onclick="submitReview()">Submit Review</button>
              </div>
            </div>
            <div class="reviews-list" id="reviews-list">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer><div class="container"><div class="footer-bottom"><span>© 2026 Retech Revival.</span></div></div></footer>
  <div id="toast-container"></div>
  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    async function loadProduct() {
      const container = document.getElementById('product-content');
      if (!id) { container.innerHTML = '<p class="text-muted" style="grid-column:1/-1">Product not found.</p>'; return; }
      try {
        const r = await fetch('/api/products/' + id);
        const data = await r.json();
        if (!data.success || !data.data) { container.innerHTML = '<p class="text-muted" style="grid-column:1/-1">Product not found.</p>'; return; }
        const p = data.data;
        document.title = p.name + ' – Retech Revival';
        const discount = Math.round((1 - p.price / p.originalPrice) * 100);
        container.innerHTML = `
          <div class="product-img-box" style="padding:0; overflow:hidden;"><img src="${p.images?.[0] || 'img/laptop1.png'}" onerror="this.src='img/laptop1.png'" style="width:100%; height:100%; object-fit:cover;" alt="Laptop"></div>
          <div class="product-details">
            <div class="product-meta">
              <span class="badge ${conditionBadgeClass(p.condition)}">${p.condition}</span>
              <span class="badge badge-blue">${p.warranty} Warranty</span>
              ${p.inStock ? '<span class="badge badge-green">✓ In Stock</span>' : '<span class="badge badge-red">Out of Stock</span>'}
            </div>
            <h1>${p.name}</h1>
            <div class="stars">${renderStars(p.rating)} <span style="color:var(--text2);font-size:0.85rem">${p.rating} (${p.reviews} reviews)</span></div>
            <div class="price-section">
              <div class="original">${formatPrice(p.originalPrice)} MRP</div>
              <div class="current">${formatPrice(p.price)}</div>
              <div class="savings">You save ${formatPrice(p.originalPrice - p.price)} (${discount}% off)</div>
            </div>
            <p style="color:var(--text2);font-size:0.92rem;line-height:1.7">${p.description || ''}</p>
            <div class="specs-grid">
              <div class="spec-item"><div class="spec-label">Processor</div><div class="spec-val">${p.processor || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">RAM</div><div class="spec-val">${p.ram || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Storage</div><div class="spec-val">${p.storage || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Display</div><div class="spec-val">${p.display || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Battery</div><div class="spec-val">${p.battery || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Brand</div><div class="spec-val">${p.brand}</div></div>
            </div>
            <div class="action-btns">
              <button class="btn btn-violet btn-lg" onclick="addToCart('${p._id}','${p.name}',${p.price},'${p.brand}','${p.condition}','${p.images?.[0] || ''}', 'buy')"><i data-lucide="shopping-cart"></i> Add to Cart</button>
              <a href="/cart.html" class="btn btn-ghost btn-lg">View Cart</a>
            </div>
            
            <div style="margin-top: 2rem; padding: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);">
              <h3 style="font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="calendar-clock"></i> Rent this device</h3>
              <p style="color:var(--text2); font-size:0.85rem; margin-bottom: 1rem;">Need it temporarily? Choose a rental plan below.</p>
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                <button class="btn btn-outline" style="padding:0.75rem 0.5rem; display:flex; flex-direction:column; gap:0.25rem;" onclick="rentProduct('${p._id}','${p.name}',${Math.round(p.price * 0.03)},'${p.brand}','${p.condition}','${p.images?.[0] || ''}', '1-Week')">
                  <span style="font-size:0.75rem; font-weight:700;">1 WEEK</span>
                  <span style="color:var(--primary)">${formatPrice(Math.round(p.price * 0.03))}</span>
                </button>
                <button class="btn btn-outline" style="padding:0.75rem 0.5rem; display:flex; flex-direction:column; gap:0.25rem;" onclick="rentProduct('${p._id}','${p.name}',${Math.round(p.price * 0.07)},'${p.brand}','${p.condition}','${p.images?.[0] || ''}', '1-Month')">
                  <span style="font-size:0.75rem; font-weight:700;">1 MONTH</span>
                  <span style="color:var(--primary)">${formatPrice(Math.round(p.price * 0.07))}</span>
                </button>
                <button class="btn btn-outline" style="padding:0.75rem 0.5rem; display:flex; flex-direction:column; gap:0.25rem;" onclick="rentProduct('${p._id}','${p.name}',${Math.round(p.price * 0.35)},'${p.brand}','${p.condition}','${p.images?.[0] || ''}', '1-Year')">
                  <span style="font-size:0.75rem; font-weight:700;">1 YEAR</span>
                  <span style="color:var(--primary)">${formatPrice(Math.round(p.price * 0.35))}</span>
                </button>
              </div>

              <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border);">
                <p style="font-size:0.85rem; font-weight:600; margin-bottom:0.75rem;">Or select custom dates:</p>
                <div style="display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
                  <div style="flex:1; min-width:120px;">
                    <label style="font-size:0.7rem; color:var(--text2); display:block; margin-bottom:0.2rem;">From Date</label>
                    <input type="date" id="rent-from" class="form-control" style="width:100%; padding:0.5rem; font-size:0.85rem;" onchange="calculateCustomRent(${p.price})">
                  </div>
                  <div style="flex:1; min-width:120px;">
                    <label style="font-size:0.7rem; color:var(--text2); display:block; margin-bottom:0.2rem;">To Date</label>
                    <input type="date" id="rent-to" class="form-control" style="width:100%; padding:0.5rem; font-size:0.85rem;" onchange="calculateCustomRent(${p.price})">
                  </div>
                </div>
                <div id="custom-rent-calc" style="margin-top:0.75rem; display:flex; justify-content:space-between; align-items:center; min-height:40px;">
                  <span id="custom-rent-info" style="font-size:0.85rem; color:var(--text2);">Select dates to see price</span>
                  <button id="custom-rent-btn" class="btn btn-violet" style="display:none; padding:0.5rem 1rem; font-size:0.85rem;" onclick="addCustomRent('${p._id}','${p.name}','${p.brand}','${p.condition}','${p.images?.[0] || ''}')">Add to Cart</button>
                </div>
              </div>
            </div>

            <div class="warranty-banner">
              <span style="font-size:1.5rem"><i data-lucide="shield-check"></i></span>
              <div><strong>${p.warranty} Warranty</strong><br><span style="font-size:0.82rem;color:var(--text2)">Quality tested and guaranteed</span></div>
            </div>
          </div>
        `;
      } catch { container.innerHTML = '<p class="text-muted" style="grid-column:1/-1">Failed to load product.</p>'; }
    }
    loadProduct();

    let currentCustomPrice = 0;
    let currentCustomDays = 0;

    function calculateCustomRent(basePrice) {
      const fromVal = document.getElementById('rent-from').value;
      const toVal = document.getElementById('rent-to').value;
      const infoSpan = document.getElementById('custom-rent-info');
      const btn = document.getElementById('custom-rent-btn');
      
      if (!fromVal || !toVal) return;
      
      const from = new Date(fromVal);
      const to = new Date(toVal);
      const diffTime = to.getTime() - from.getTime();
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      if (diffDays <= 0) {
        infoSpan.textContent = 'End date must be after start date';
        infoSpan.style.color = 'var(--red)';
        btn.style.display = 'none';
        return;
      }
      
      // Calculate price: ~0.5% of base price per day
      currentCustomDays = diffDays;
      currentCustomPrice = Math.round(basePrice * 0.005 * diffDays);
      if(currentCustomPrice < 300) currentCustomPrice = 300; // minimum ₹300
      
      infoSpan.innerHTML = `<strong>${diffDays} Days</strong> = ${formatPrice(currentCustomPrice)}`;
      infoSpan.style.color = 'var(--text)';
      btn.style.display = 'block';
    }

    function addCustomRent(id, name, brand, condition, image) {
      if(currentCustomDays > 0 && currentCustomPrice > 0) {
        rentProduct(id, name, currentCustomPrice, brand, condition, image, currentCustomDays + '-Days');
      }
    }

    function rentProduct(id, name, price, brand, condition, image, duration) {
      addToCart(id, name, price, brand, condition, image, 'rent', duration);
    }

    function toggleMenu() {
      const navLinks = document.getElementById('nav-links');
      if(navLinks) navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
    }

    // ── Reviews Logic ──────────────────────────────
    let selectedRating = 0;

    function initStarSelector() {
      const container = document.getElementById('star-selector');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-btn';
        btn.textContent = '★';
        btn.onclick = () => {
          selectedRating = i;
          container.querySelectorAll('.star-btn').forEach((b, idx) => {
            b.classList.toggle('active', idx < i);
          });
        };
        btn.onmouseenter = () => {
          container.querySelectorAll('.star-btn').forEach((b, idx) => {
            b.style.color = idx < i ? '#f59e0b' : '';
          });
        };
        btn.onmouseleave = () => {
          container.querySelectorAll('.star-btn').forEach((b, idx) => {
            b.style.color = '';
          });
        };
        container.appendChild(btn);
      }
    }

    function toggleReviewForm() {
      if (!currentUser) { showAuthRequiredModal(); return; }
      const form = document.getElementById('review-form-card');
      form.classList.toggle('visible');
      if (form.classList.contains('visible')) {
        form.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    async function loadReviews() {
      if (!id) return;
      try {
        const r = await fetch('/api/reviews/' + id);
        const data = await r.json();
        if (!data.success) return;
        renderReviewStats(data.data.stats);
        renderReviewCards(data.data.reviews);
      } catch { }
    }

    function renderReviewStats(stats) {
      document.getElementById('big-rating').textContent = stats.avgRating.toFixed(1);
      document.getElementById('big-stars').textContent = renderStars(stats.avgRating);
      document.getElementById('total-text').textContent = stats.total + (stats.total === 1 ? ' review' : ' reviews');
      document.getElementById('review-total-badge').textContent = stats.total + ' reviews';
      const barsEl = document.getElementById('rating-bars');
      let barsHTML = '';
      for (let i = 5; i >= 1; i--) {
        const count = stats.distribution[i - 1];
        const pct = stats.total > 0 ? (count / stats.total) * 100 : 0;
        barsHTML += `<div class="rating-bar">
          <span class="bar-label">${i}</span><span class="bar-star">★</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="bar-count">${count}</span>
        </div>`;
      }
      barsEl.innerHTML = barsHTML;
    }

    function renderReviewCards(reviews) {
      const list = document.getElementById('reviews-list');
      if (!reviews.length) {
        list.innerHTML = `<div class="no-reviews"><div class="no-reviews-icon">💬</div><p>No reviews yet. Be the first to share your experience!</p></div>`;
        return;
      }
      list.innerHTML = reviews.map(r => {
        const initials = r.userName.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const date = new Date(r.createdAt).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
        return `<div class="review-card" style="animation:fadeInUp 0.5s ease forwards">
          <div class="review-card-header">
            <div class="review-author">
              <div class="review-avatar">${initials}</div>
              <div class="review-author-info">
                <div class="review-name">${r.userName}</div>
                <div class="review-date">${date}</div>
              </div>
            </div>
            ${r.verified ? '<span class="review-verified">✓ Verified Purchase</span>' : ''}
          </div>
          <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
          <div class="review-title">${r.title}</div>
          <div class="review-body">${r.body}</div>
          <div class="review-footer">
            <button class="helpful-btn" onclick="markHelpful('${r._id}', this)">👍 Helpful (${r.helpful})</button>
          </div>
        </div>`;
      }).join('');
    }

    async function submitReview() {
      if (!currentUser) { showAuthRequiredModal(); return; }
      if (!selectedRating) { showToast('Please select a star rating', 'error'); return; }
      const title = document.getElementById('review-title').value.trim();
      const body = document.getElementById('review-body').value.trim();
      if (!title) { showToast('Please add a review title', 'error'); return; }
      if (!body) { showToast('Please write your review', 'error'); return; }
      const btn = document.getElementById('submit-review-btn');
      btn.disabled = true; btn.textContent = 'Submitting...';
      try {
        const r = await fetch('/api/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId: id, rating: selectedRating, title, body })
        });
        const data = await r.json();
        if (data.success) {
          showToast('Review submitted! Thank you 🎉', 'success');
          document.getElementById('review-form-card').classList.remove('visible');
          document.getElementById('review-title').value = '';
          document.getElementById('review-body').value = '';
          selectedRating = 0;
          document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
          loadReviews();
        } else {
          showToast(data.message || 'Failed to submit review', 'error');
        }
      } catch { showToast('Network error. Try again.', 'error'); }
      btn.disabled = false; btn.textContent = 'Submit Review';
    }

    async function markHelpful(reviewId, btn) {
      try {
        const r = await fetch('/api/reviews/' + reviewId + '/helpful', { method: 'POST' });
        const data = await r.json();
        if (data.success) {
          btn.innerHTML = '👍 Helpful (' + data.data.helpful + ')';
          btn.style.borderColor = 'var(--accent)';
          btn.style.color = 'var(--accent)';
        }
      } catch { }
    }

    // Char counters
    document.addEventListener('DOMContentLoaded', () => {
      initStarSelector();
      loadReviews();
      const titleInput = document.getElementById('review-title');
      const bodyInput = document.getElementById('review-body');
      if (titleInput) titleInput.addEventListener('input', () => { document.getElementById('title-chars').textContent = titleInput.value.length; });
      if (bodyInput) bodyInput.addEventListener('input', () => { document.getElementById('body-chars').textContent = bodyInput.value.length; });
    });
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
